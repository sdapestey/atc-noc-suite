# ATC NOC Suite — Docker (servidor, ~8 operadores)
#
#   docker compose up -d --build
#   UI: http://<IP-del-servidor>:9000

services:
  noc-suite:
    build: .
    image: atc-noc-suite:latest
    container_name: atc-noc-suite
    env_file:
      - .env
    environment:
      GUNICORN_BIND: 0.0.0.0:9000
      GUNICORN_WORKERS: "4"
      GUNICORN_TIMEOUT: "300"
      FLASK_DEBUG: "0"
    ports:
      - "${NOC_SUITE_PUBLISH_PORT:-9000}:9000"
    restart: unless-stopped
    # La app debe alcanzar Postgres y Altiplano en la red del host/LAN
    extra_hosts:
      - "host.docker.internal:host-gateway"
