{# Splash índice: inline muestra al instante; splash.js cierra al DOMContentLoaded. #}
<link rel="stylesheet" href="{{ url_for('static', filename='css/splash.css') }}">
<div id="noc-splash-overlay"
     class="noc-splash noc-splash--intro"
     hidden
     tabindex="-1"
     aria-hidden="true"
     role="dialog"
     aria-modal="true"
     aria-labelledby="noc-splash-title"
     data-autoclose-ms="2600">
  <div class="noc-splash-backdrop" aria-hidden="true" title="Cerrar"></div>
  <div class="noc-splash-inner">
    <img id="noc-splash-logo"
         class="noc-splash-logo noc-splash-logo--pulse"
         src="{{ url_for('static', filename=config.SPLASH_LOGO_STATIC) }}"
         alt=""
         width="791"
         height="593"
         decoding="async">
    <h1 id="noc-splash-title" class="noc-splash-title noc-splash-title--reveal">ATC NOC Suite</h1>
    <p class="noc-splash-lead muted">Consultas, dashboards e inventario GPON</p>
  </div>
</div>
<script>
(function () {
  var KEY = "noc_splash_v1";
  var overlay = document.getElementById("noc-splash-overlay");
  if (!overlay) return;
  if ((window.location.pathname || "") !== "/") return;

  function hasDeepLinkIntent() {
    try {
      var params = new URLSearchParams(window.location.search || "");
      return !!(
        (params.get("q") || "").trim() ||
        (params.get("rama") || "").trim() ||
        (params.get("value") || "").trim()
      );
    } catch (e) {
      return false;
    }
  }

  function markSplashSeen() {
    try {
      window.sessionStorage.setItem(KEY, "1");
    } catch (e2) {}
  }

  function splashAlreadySeen() {
    try {
      return window.sessionStorage.getItem(KEY) === "1";
    } catch (e) {
      return false;
    }
  }

  if (hasDeepLinkIntent()) {
    markSplashSeen();
    return;
  }
  if (splashAlreadySeen()) return;

  overlay.removeAttribute("hidden");
  overlay.setAttribute("aria-hidden", "false");
  overlay.setAttribute("data-splash-shown-at", String(Date.now()));
  overlay.classList.add("noc-splash--visible", "noc-splash--in");
  var root = document.body || document.documentElement;
  if (root) root.classList.add("noc-splash-open");

  var title = document.getElementById("noc-splash-title");
  if (title && title.classList.contains("noc-splash-title--reveal") && !title.dataset.split) {
    var text = title.textContent || "";
    title.textContent = "";
    title.classList.add("noc-splash-title--split");
    var reduceMotion = false;
    try {
      reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    } catch (e3) {}
    for (var i = 0; i < text.length; i++) {
      var ch = text.charAt(i);
      var wrap = document.createElement("span");
      wrap.className = "noc-splash-title-char-wrap";
      if (!reduceMotion) {
        wrap.style.setProperty("--char-delay", (0.25 + i * 0.12) + "s");
      }
      var inner = document.createElement("span");
      inner.className = "noc-splash-title-char";
      inner.textContent = ch === " " ? "\u00a0" : ch;
      wrap.appendChild(inner);
      title.appendChild(wrap);
    }
    title.dataset.split = "1";
  }
})();
</script>
<script defer src="{{ url_for('static', filename='js/splash.js') }}?v=splash-ls3"></script>
